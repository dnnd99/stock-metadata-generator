<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock Icon Metadata Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #161922;
    --border: #2a2e3a;
    --text: #e8e9ee;
    --muted: #8b909e;
    --accent: #5b8cff;
    --ok: #34d399;
    --err: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
  }
  .wrap { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.sub { color: var(--muted); margin-top: 0; font-size: 14px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input[type="text"], textarea, select {
    width: 100%;
    background: #0f1117;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    margin-bottom: 14px;
  }
  textarea { resize: vertical; min-height: 60px; }
  input[type="file"] { margin-bottom: 14px; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: #2a2e3a; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 500; }
  .status-ok { color: var(--ok); }
  .status-err { color: var(--err); }
  .thumb { width: 40px; height: 40px; object-fit: contain; background: white; border-radius: 4px; }
  .kw { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Stock Icon Metadata Generator</h1>
  <p class="sub">Upload icon, generate title/description/keywords via Gemini Vision (+ Groq fallback), export CSV.</p>

  <div class="panel">
    <label>Niche keywords tetap (pisah koma — kosongin kalau nggak perlu)</label>
    <textarea id="nicheKeywords" placeholder="contoh: america 250, 250th anniversary, us independence day, patriotic icon, red white blue, usa 2026, flat vector icon"></textarea>

    <label>Pilih gambar icon (PNG/JPG, bisa banyak sekaligus)</label>
    <input type="file" id="fileInput" accept="image/png,image/jpeg" multiple />

    <label>Ekstensi file yang mau dijual (buat nama file di CSV)</label>
    <select id="sourceExt">
      <option value=".eps">.eps (vector)</option>
      <option value=".ai">.ai</option>
      <option value=".svg">.svg</option>
      <option value=".png">.png</option>
      <option value=".jpg">.jpg</option>
    </select>

    <div class="row" style="margin-top:14px;">
      <button id="runBtn">Generate Metadata</button>
      <button id="csvBtn" class="secondary" disabled>Download CSV (6 Platform)</button>
    </div>
  </div>

  <div class="panel">
    <table id="resultsTable">
      <thead>
        <tr><th></th><th>File</th><th>Title</th><th>Status</th></tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const runBtn = document.getElementById("runBtn");
const csvBtn = document.getElementById("csvBtn");
const resultsBody = document.getElementById("resultsBody");
const nicheKeywordsInput = document.getElementById("nicheKeywords");

let results = []; // { filename, title, description, keywords, adobe_category, shutterstock_categories, ok }

const MAX_DIMENSION = 3000; // aman di bawah limit ~33 juta pixel Groq/Gemini

function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let { width, height } = img;
      if (width > MAX_DIMENSION || height > MAX_DIMENSION) {
        const scale = MAX_DIMENSION / Math.max(width, height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      canvas.toBlob(
        (blob) => {
          if (!blob) return reject(new Error("Gagal resize gambar"));
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        },
        "image/png",
        0.92
      );
    };
    img.onerror = reject;
    img.src = url;
  });
}

function fileToBase64(file) {
  return resizeImage(file);
}

function addRow(filename, thumbSrc) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><img class="thumb" src="${thumbSrc}" /></td>
    <td>${filename}</td>
    <td class="title-cell">-</td>
    <td class="status-cell">Menunggu...</td>
  `;
  resultsBody.appendChild(tr);
  return tr;
}

function sleep(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

async function callAnalyze(b64, nicheKeywords) {
  const resp = await fetch("/.netlify/functions/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ imageB64: b64, mimeType: "image/png", nicheKeywords }),
  });
  return resp.json();
}

async function processFile(file, nicheKeywords) {
  const thumbSrc = URL.createObjectURL(file);
  const row = addRow(file.name, thumbSrc);
  const statusCell = row.querySelector(".status-cell");
  const titleCell = row.querySelector(".title-cell");

  const MAX_ATTEMPTS = 20; // terus retry sampai berhasil, dibatasi biar gak infinite loop kalau API-nya down total

  try {
    const b64 = await fileToBase64(file);

    let data = null;
    for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
      statusCell.textContent = attempt === 1 ? "Memproses..." : `Retry ${attempt - 1}/${MAX_ATTEMPTS - 1}...`;
      data = await callAnalyze(b64, nicheKeywords);
      if (data.ok) break;
      if (attempt < MAX_ATTEMPTS) {
        const delayMs = Math.min(3000 * attempt, 20000); // jeda naik: 3s, 6s, 9s... max 20s
        statusCell.textContent = `Gagal, tunggu ${Math.round(delayMs / 1000)}s sebelum retry ${attempt}/${MAX_ATTEMPTS - 1}...`;
        await sleep(delayMs);
      }
    }

    if (data.ok) {
      titleCell.textContent = data.title;
      statusCell.innerHTML = `<span class="status-ok">OK (${data.source})</span>`;
      results.push({ filename: file.name, ...data });
    } else {
      const detailsHtml = (data.details || []).map((d) => `<div class="kw">${d}</div>`).join("");
      statusCell.innerHTML = `<span class="status-err">Gagal setelah ${MAX_ATTEMPTS}x coba: ${data.error || "unknown"}</span>${detailsHtml}`;
      results.push({ filename: file.name, ok: false, error: data.error });
    }
  } catch (e) {
    statusCell.innerHTML = `<span class="status-err">Error: ${e.message}</span>`;
    results.push({ filename: file.name, ok: false, error: String(e) });
  }
}

runBtn.addEventListener("click", async () => {
  const files = Array.from(fileInput.files || []);
  if (!files.length) { alert("Pilih gambar dulu"); return; }

  const nicheKeywords = nicheKeywordsInput.value
    .split(",").map((s) => s.trim()).filter(Boolean);

  if (nicheKeywords.length === 0) {
    const proceed = confirm(
      "Field 'Niche keywords tetap' masih KOSONG.\n\n" +
      "Kalau lanjut, icon-icon ini TIDAK akan dapet keyword niche tambahan (misal: 'america 250', 'bento box', dll).\n\n" +
      "Lanjutkan tanpa niche keyword?"
    );
    if (!proceed) return;
  }

  results = [];
  resultsBody.innerHTML = "";
  runBtn.disabled = true;
  csvBtn.disabled = true;

  // proses satu-satu biar nggak spam rate limit sekaligus
  for (const file of files) {
    await processFile(file, nicheKeywords);
  }

  runBtn.disabled = false;
  csvBtn.disabled = results.every((r) => !r.ok);
});

const ADOBE_CATEGORIES = [
  "Animals", "Buildings and architecture", "Business", "Drinks",
  "The environment", "States of mind", "Food", "Graphic resources",
  "Hobbies and leisure", "Industry", "Landscape", "Lifestyle",
  "People", "Plants and flowers", "Culture and religion", "Science",
  "Social issues", "Sports", "Technology", "Transport", "Travel",
];

function adobeCategoryNumber(name) {
  const exactIdx = ADOBE_CATEGORIES.indexOf(name);
  if (exactIdx !== -1) return exactIdx + 1;
  const lower = (name || "").toLowerCase();
  for (let i = 0; i < ADOBE_CATEGORIES.length; i++) {
    const cat = ADOBE_CATEGORIES[i].toLowerCase();
    if (lower.includes(cat) || cat.includes(lower)) return i + 1;
  }
  return 8; // default: Graphic resources
}

function csvField(val, quoteAll) {
  const s = String(val ?? "");
  if (quoteAll || s.includes(",") || s.includes('"') || s.includes("\n") || s.includes(";")) {
    return `"${s.replace(/"/g, '""')}"`;
  }
  return s;
}

function buildCsv(headers, rows, { delimiter = ",", quoteAll = false } = {}) {
  const lines = [headers.map((h) => csvField(h, quoteAll)).join(delimiter)];
  for (const row of rows) {
    lines.push(row.map((v) => csvField(v, quoteAll)).join(delimiter));
  }
  return lines.join("\r\n");
}

function exportAllPlatformCsvs(results, sourceExt) {
  const rows = results
    .filter((r) => r.ok)
    .map((r) => {
      const base = r.filename.replace(/\.[^/.]+$/, "");
      const title = (r.title || "").replace(/,/g, "");
      const description = r.description || title;
      const keywordsStr = (r.keywords || []).join(", ");
      const adobeCatNum = adobeCategoryNumber(r.adobe_category);
      const shutterCatsStr = (r.shutterstock_categories || []).slice(0, 2).join(",");
      return { base, title, description, keywordsStr, adobeCatNum, shutterCatsStr };
    });

  const files = {};

  // 1. Adobe Stock
  files["adobe_stock.csv"] = buildCsv(
    ["Filename", "Title", "Keywords", "Category", "Releases"],
    rows.map((r) => [`${r.base}${sourceExt}`, r.title, r.keywordsStr, r.adobeCatNum, ""])
  );

  // 2. DepositPhotos
  files["depositphotos.csv"] = buildCsv(
    ["Filename", "description", "Keywords", "Nudity", "Editorial"],
    rows.map((r) => [`${r.base}${sourceExt}`, r.description, r.keywordsStr, "no", "no"]),
    { quoteAll: true }
  );

  // 3. Magnific (semicolon-delimited)
  files["magnific.csv"] = buildCsv(
    ["File name", "Title", "Keywords", "Prompt", "Model"],
    rows.map((r) => [`${r.base}${sourceExt}`, r.title, r.keywordsStr, "", ""]),
    { delimiter: ";", quoteAll: true }
  );

  // 4. MiriCanvas
  files["miricanvas.csv"] = buildCsv(
    ["fileName", "uniqueId", "elementName", "keywords", "tier", "contentType"],
    rows.map((r) => [r.base, "", r.title, r.keywordsStr, "", ""]),
    { quoteAll: true }
  );

  // 5. Shutterstock
  files["shutterstock.csv"] = buildCsv(
    ["Filename", "Description", "Keywords", "Categories", "Editorial", "Mature content", "illustration"],
    rows.map((r) => [`${r.base}${sourceExt}`, r.description, r.keywordsStr, r.shutterCatsStr, "no", "no", "yes"])
  );

  // 6. Vecteezy (underscore dihapus dari nama file)
  files["vecteezy.csv"] = buildCsv(
    ["Filename", "Title", "Description", "Keywords", "License"],
    rows.map((r) => {
      const vBase = r.base.replace(/_/g, "");
      return [`${vBase}${sourceExt}`, r.title, r.description, r.keywordsStr, "Pro"];
    })
  );

  return files;
}

csvBtn.addEventListener("click", async () => {
  const sourceExt = document.getElementById("sourceExt").value || ".eps";
  const files = exportAllPlatformCsvs(results, sourceExt);

  const zip = new JSZip();
  for (const [name, content] of Object.entries(files)) {
    zip.file(name, content);
  }
  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "stock-metadata-6platform.zip";
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
